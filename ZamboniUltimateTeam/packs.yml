# packs.yml - HUT Pack Configuration
# Loot:
#   Guaranteed: always awarded, Count per CardType with optional Filters
#   Randomized: weighted pools, Weights are relative (don't need to sum to 100)
#   Limits: max times a CardType can appear in randomized rolls
# Filters: Rating/Zcat {RangeStart, RangeEnd} | Rare: 0/1 | IsAway: bool | PreferredPosition: int
# Zcat: db sub-category column used to separate card tiers within a CardType
# Zrating, zvictory, zlegendary, filter on real rating or card visuals
# CardTypes: Player, Coach, Kit, Badge, Stadium, Contract, Training, Healing
Packs:
  #Starer pack
  - PackId: 1
    PackStoreId: 0
    CoinCost: 0
    Attributes: 0
    Availability: 0
    StartDate: 0
    EndDate: 0
    Quantity: 0
    SaleType: 0
    State: 0
    Loot:
      Guaranteed:
        - CardType: Kit
          Count: 1
          Filters:
            IsAway: true
            Alternative: false
        - CardType: Kit
          Count: 1
          Filters:
            IsAway: false
            Alternative: false
        - CardType: Badge
          Count: 1
        - CardType: Stadium
